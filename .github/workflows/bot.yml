name: Masha Bot — LOCAL-FIRST v13 — BMW News from sochiautoparts/nws

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: masha-bot-single
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
  OWNER_ID: ${{ secrets.OWNER_ID }}
  CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
  CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
  POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
  POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
  CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
  CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
  CF_ACCOUNT_ID_2: ${{ secrets.CF_ACCOUNT_ID_2 }}
  CF_API_TOKEN_2: ${{ secrets.CF_API_TOKEN_2 }}
  GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
  GH_REPO: sochiautoparts/masha-bot
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  ADMITAD_ADS_FILE: data/admitad_ads.json
  DB_PATH: masha_bot.db
  PYTHONUNBUFFERED: "1"
  LOG_LEVEL: INFO
  # Local model — ENABLED (RuadaptQwen3-4B-Instruct Q4_K_M, ~2.5GB)
  ENABLE_LOCAL_MODEL: "true"
  MODEL_PATH: "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf"
  MODEL_N_CTX: "4096"
  MODEL_N_THREADS: "2"
  MODEL_MAX_TOKENS: "1024"
  MODEL_AUTO_DOWNLOAD: "true"
  MODEL_DOWNLOAD_URL: "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf"
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  # Schedule settings
  NEWS_INTERVAL_MINUTES: "30"
  CHANNEL_POST_INTERVAL_MINUTES: "60"
  PARTNER_POST_INTERVAL_HOURS: "4"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install system dependencies for llama-cpp-python (OpenBLAS for fast CPU inference)
          sudo apt-get update -qq && sudo apt-get install -y -qq libopenblas-dev
          # Install llama-cpp-python with CPU optimizations (OpenBLAS for fast inference)
          CMAKE_ARGS="-DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS" pip install llama-cpp-python>=0.3.0 --no-cache-dir
          # Install remaining dependencies
          pip install -r requirements.txt

      - name: Cache local model
        uses: actions/cache@v4
        with:
          path: models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
          key: ruadapt-qwen3-4b-instruct-q4km-gguf-v1
          restore-keys: |
            ruadapt-qwen3-4b-instruct-q4km-gguf-

      - name: Download local model (if not cached)
        run: |
          mkdir -p models
          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "Model file found in cache: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "Cached file too small, removing..."
              rm -f models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
            fi
          fi

          if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            echo "Downloading RuadaptQwen3-4B-Instruct Q4_K_M (~2.5GB)..."
            if [ -n "$HF_TOKEN" ]; then
              echo "Using HuggingFace token for authenticated download..."
              pip install huggingface_hub -q
              hf download --local-dir models --include "Q4_K_M.gguf" RefalMachine/RuadaptQwen3-4B-Instruct-GGUF --token "$HF_TOKEN"
              if [ -f "models/Q4_K_M.gguf" ] && [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                mv models/Q4_K_M.gguf models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
              fi
            else
              echo "No HF_TOKEN set, trying unauthenticated download..."
              curl -L --max-time 600 --retry 3 --retry-delay 10 \
                -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf"
            fi
          fi

          # Verify
          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "Model file size: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "ERROR: Model file too small or corrupted!"
              rm -f models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
              echo "WARNING: Model download failed — bot will run in cloud-only mode"
              echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
            fi
          else
            echo "WARNING: Model download failed — bot will run in cloud-only mode"
            echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
          fi

      - name: Clean Python cache
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          echo "Python cache cleaned"

      - name: Download Admitad partner data
        run: |
          echo "=== Downloading admitad partner data ==="
          mkdir -p data
          # Try primary source (may be down)
          curl -sL "https://raw.githubusercontent.com/creastudioai-beep/pr/main/data/admitad_ads.json" \
            -o data/admitad_ads.json 2>/dev/null || true
          # Check if download succeeded and file is valid JSON
          if [ -f data/admitad_ads.json ] && python3 -c "import json; json.load(open('data/admitad_ads.json'))" 2>/dev/null; then
            echo "OK: admitad_ads.json downloaded ($(wc -c < data/admitad_ads.json) bytes)"
          else
            echo "WARNING: admitad_ads.json download failed or invalid — partner posts will be skipped"
            rm -f data/admitad_ads.json 2>/dev/null || true
          fi

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: masha_bot.db
          key: masha-bot-db-v3
          restore-keys: |
            masha-bot-db-

      - name: Ensure .gitignore allows database
        run: |
          if [ -f .gitignore ]; then
            sed -i '/masha_bot\.db/d' .gitignore
          fi

      - name: Run Masha Bot with auto-restart
        run: |
          echo "=== Starting Masha Bot v13.0 — BMW News from sochiautoparts/nws ==="
          echo "NEWS SOURCES: bmw-news.json (sochiautoparts/nws) → RSS (15+ feeds) → Web Search"
          echo "ARCHITECTURE: Local-First 5-Level Failover + Local-Only Post Fallback"
          echo "EDITORIAL TEAM: Маша + Серёга + Костя + Лена + Доктор Ван Дамм(кот) + Кинг-Конг(попугай)"
          echo ""

          # Verify model file before starting
          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "LOCAL MODEL: Available (${SIZE_MB} MB)"
          else
            echo "LOCAL MODEL: NOT FOUND — running in cloud-only mode"
            echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
          fi

          MAX_RESTARTS=10
          RESTART_COUNT=0

          while [ $RESTART_COUNT -lt $MAX_RESTARTS ]; do
            echo "=== Bot start attempt $((RESTART_COUNT + 1))/$MAX_RESTARTS ==="

            timeout 18000 python -m bot.main || EXIT_CODE=$?
            EXIT_CODE=${EXIT_CODE:-0}

            echo "Bot exited with code: $EXIT_CODE"

            # Check if this run was cancelled by concurrency
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              # Check if there's a newer pending run — if so, don't restart
              PENDING=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=waiting&per_page=1" | \
                python3 -c "import json,sys; print(len(json.load(sys.stdin).get('workflow_runs',[])))" 2>/dev/null || echo 0)
              if [ "$PENDING" -gt 0 ]; then
                echo "Another run is waiting — exiting to avoid queue buildup"
                break
              fi
            fi

            if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 124 ]; then
              echo "Bot process ended (timeout or normal exit), restarting..."
              RESTART_COUNT=$((RESTART_COUNT + 1))
              sleep 5
            else
              echo "Bot crashed with error code $EXIT_CODE, restarting..."
              RESTART_COUNT=$((RESTART_COUNT + 1))
              sleep 10
            fi
          done

          echo "Max restarts reached or stopping — will save DB and re-dispatch."

      - name: Save database
        if: always()
        run: |
          if [ -f masha_bot.db ]; then
            git config user.name "Masha Bot"
            git config user.email "masha-bot@users.noreply.github.com"
            git add -f masha_bot.db || true
            git diff --staged --quiet || git commit -m "db: update $(date +%Y-%m-%d_%H:%M)" || true
            git pull --rebase origin main || true
            git push || true
          fi

      - name: Re-dispatch workflow for 24/7 operation
        if: always()
        run: |
          # Only re-dispatch if this was a scheduled or manual run, not if cancelled
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Re-dispatching workflow for continuous operation..."
            sleep 30
            curl -X POST \
              -H "Authorization: token ${{ secrets.GH_PAT_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/sochiautoparts/masha-bot/actions/workflows/bot.yml/dispatches" \
              -d '{"ref":"main"}' || echo "Re-dispatch failed, will retry on next schedule"
          else
            echo "Skipping re-dispatch (not a scheduled or manual trigger)"
          fi
