name: masha-bot Schedule

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Force post generation'
        required: false
        default: 'false'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
      CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
      OWNER_ID: ${{ secrets.OWNER_ID }}
      POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
      POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
      GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
      GH_REPO: ${{ secrets.GH_REPO }}
      MASHA_BOT_MODE: single
      LOG_LEVEL: INFO
      DB_PATH: masha_bot.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: masha_bot.db
          key: masha-bot-db-v1-${{ github.run_id }}
          restore-keys: |
            masha-bot-db-v1-

      - name: Run masha-bot
        run: |
          python -m bot.main
        continue-on-error: true

      - name: Commit database changes
        run: |
          git config --local user.email "masha-bot@users.noreply.github.com"
          git config --local user.name "Masha Bot"
          if [ -f masha_bot.db ]; then
            git add masha_bot.db || true
            git diff --staged --quiet || git commit -m "📊 Update database $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi
        continue-on-error: true

      - name: Push changes
        if: success()
        run: |
          git push
        continue-on-error: true

      - name: Self-dispatch next run
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ secrets.GH_REPO }}/actions/workflows/bot.yml/dispatches \
            -d '{"ref":"main"}'
        continue-on-error: true
