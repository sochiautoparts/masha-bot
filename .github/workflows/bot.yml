name: Run Masha Bot 24/7 (OpenClaw)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: masha-bot-single
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
      - name: Cancel conflicting runs and wait
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          CURRENT_RUN=${{ github.run_id }}
          REPO=${{ github.repository }}
          for status in in_progress queued; do
            RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs?status=$status&per_page=10" \
              | python3 -c 'import sys,json;d=json.load(sys.stdin);[print(r["id"]) for r in d.get("workflow_runs",[]) if r["id"]!=int(sys.argv[1])]' "$CURRENT_RUN")
            for run_id in $RUNS; do
              curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$REPO/actions/runs/$run_id/cancel" || true
            done
          done
          sleep 60

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node.js (for OpenClaw)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies (libcairo for SVG→PNG)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcairo2
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OpenClaw
        run: |
          npm install -g openclaw@latest
          openclaw --version

      - name: Clean Python cache
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Create data directory
        run: mkdir -p data

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/masha.db
          key: masha-bot-db-v1
          restore-keys: |
            masha-bot-db-

      - name: Generate OpenClaw config (dry check)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: |
          python3 scripts/gen_openclaw_config.py --out /tmp/oc-preview.json
          cat /tmp/oc-preview.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('providers:', list(d['models']['providers'].keys())); print('primary:', d['agents']['defaults']['model']['primary'])"

      - name: Run Masha Bot (OpenClaw) with unlimited auto-restart
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
          OPENCLAW_PORT: "18789"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          DB_PATH: data/masha.db
          LOG_LEVEL: INFO
        run: |
          set +e
          RETRY=0; LAST_START=0
          while true; do
            RETRY=$((RETRY+1))
            NOW=$(date +%s)
            if [ $((NOW - LAST_START)) -gt 600 ]; then RETRY=1; fi
            LAST_START=$NOW
            python3 -m bot.main
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then sleep 5
            elif [ $RETRY -le 3 ]; then sleep 10
            elif [ $RETRY -le 6 ]; then sleep 15
            else sleep 30; fi
          done

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/masha.db
          key: masha-bot-db-v1-${{ github.run_id }}

      - name: Save database to git
        if: always()
        run: |
          if [ -f data/masha.db ]; then
            git config user.name "Masha Bot"
            git config user.email "masha-bot@users.noreply.github.com"
            git fetch origin main || true
            git checkout -B db-update origin/main
            git add -f data/masha.db || true
            git diff --staged --quiet || git commit -m "db: update $(date +%Y-%m-%d_%H:%M)" || true
            git push origin db-update:main 2>&1 || echo "DB push skipped (newer commits — OK, cached via actions/cache)"
          fi

      - name: Re-dispatch workflow for 24/7
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          REPO=${{ github.repository }}
          sleep 10
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/bot.yml/dispatches" -d '{"ref":"main"}')
            if [ "$HTTP_CODE" = "204" ]; then echo "✅ Re-dispatched (attempt $i)"; break; fi
            echo "❌ Attempt $i failed (HTTP $HTTP_CODE), retrying..."; sleep 15
          done

      - name: Cleanup
        if: always()
        run: echo "=== Bot session ended ==="
