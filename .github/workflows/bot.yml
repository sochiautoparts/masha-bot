name: Masha Bot — LOCAL-FIRST v15 — BMW News from sochiautoparts/nws

# ═══════════════════════════════════════════════════════════════
# Masha Bot v15.0 — LOCAL-FIRST RuadaptQwen3-4B + CLOUD FAILOVER
# Aligned with asya-bot architecture for proven stability.
#
#   - LOCAL MODEL: RuadaptQwen3-4B-Instruct Q4_K_M (~2.5GB GGUF, CPU inference)
#   - LOCAL-FIRST for chat/comments (saves cloud balance!)
#   - CLOUD-FIRST for function routes (posts, VIN, diagnostics)
#   - 4-LEVEL FAILOVER: Local -> Pollinations(key) -> Pollinations(free) -> Cloudflare -> Local-Only/Static
#   - Model caching via actions/cache@v4
#   - HF_TOKEN for authenticated HuggingFace download
#   - libopenblas-dev for fast CPU inference via llama-cpp-python
#   - Pollinations.ai (44+ models, dual-key failover) — ALL routes
#   - Cloudflare Workers AI (mistral-small-3.1, dual-account failover)
#   - asyncio.Lock on llama-cpp to prevent segfaults
#
# Schedule (UTC, Moscow = UTC+3):
#   Every 5 hours: 00:00, 05:00, 10:00, 15:00, 20:00
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 0 * * *'      # 00:00 UTC = 03:00 Moscow
    - cron: '0 5 * * *'      # 05:00 UTC = 08:00 Moscow
    - cron: '0 10 * * *'     # 10:00 UTC = 13:00 Moscow
    - cron: '0 15 * * *'     # 15:00 UTC = 18:00 Moscow
    - cron: '0 20 * * *'     # 20:00 UTC = 23:00 Moscow
  workflow_dispatch:

# ═══ CRITICAL: Single concurrency group (aligned with asya-bot) ═══
# v9.0: Changed cancel-in-progress: true → false
# Why: With cancel-in-progress: true, every new cron / self-dispatch was killing the
# currently-running bot mid-cycle. This caused:
#   - Bot process killed in the middle of AI generation (wasted API calls)
#   - Database transactions interrupted (occasional corruption)
#   - The "Re-dispatch workflow" step never running, so 24/7 coverage was lost
#   - Logs showing dozens of runs cancelled within minutes of starting
# With cancel-in-progress: false, new triggers are queued and run AFTER the current
# run finishes naturally. The 5h45m timeout ensures the bot can't run forever.
concurrency:
  group: masha-bot-single
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  PYTHONUNBUFFERED: "1"
  # Force Node.js 24 for GitHub Actions — Node.js 20 deprecated since June 16, 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # v15: ~5h45m (aligned with asya-bot). Allows setup + 5h bot run + save/cleanup.
    timeout-minutes: 345

    steps:
      # ── Kill conflicting runs (aligned with asya-bot) ──
      # Prevents queue buildup when cron overlaps with a still-running bot.
      # cancel-in-progress: true cancels in-progress; this step also clears queued.
      - name: Cancel conflicting runs and wait
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Checking for other running bot instances ==="
          CURRENT_RUN=${{ github.run_id }}
          REPO=${{ github.repository }}

          for status in in_progress queued; do
            RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs?status=$status&per_page=10" \
              | python3 -c '
          import sys, json
          try:
              d = json.load(sys.stdin)
              for r in d.get("workflow_runs", []):
                  if r["id"] != int(sys.argv[1]):
                      print(r["id"])
          except: pass
          ' "$CURRENT_RUN")

            for run_id in $RUNS; do
              echo "Cancelling $status run: $run_id"
              curl -s -X POST -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$run_id/cancel" || true
            done
          done

          echo "Waiting 60s for old bot instances to fully stop..."
          sleep 60
          echo "=== Ready to start ==="

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install system dependencies for llama-cpp-python (OpenBLAS for fast CPU inference)
          sudo apt-get update -qq && sudo apt-get install -y -qq libopenblas-dev
          # Install llama-cpp-python with CPU optimizations (OpenBLAS for fast inference)
          CMAKE_ARGS="-DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS" pip install 'llama-cpp-python>=0.3.0' --no-cache-dir
          # Install remaining dependencies
          pip install -r requirements.txt

      - name: Clean Python cache and phantom files
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          # Remove phantom file created by pip when parsing '>=0.3.0'
          rm -f '=0.3.0'
          echo "Python cache cleaned"

      - name: Create data directory
        run: mkdir -p data models

      - name: Download partner data (partners.json)
        run: |
          mkdir -p data
          # Download partners.json from sochiautoparts.ru (the single source of truth)
          HTTP_CODE=$(curl -sL -o /tmp/partners_check.json -w "%{http_code}" "https://sochiautoparts.ru/partners.json")
          if [ "$HTTP_CODE" = "200" ]; then
            # Validate it's actually JSON with a `campaigns` array
            if python3 -c "import json,sys; d=json.load(open('/tmp/partners_check.json')); assert isinstance(d.get('campaigns'), list) and d['campaigns'], 'no campaigns'" 2>/dev/null; then
              cp /tmp/partners_check.json data/partners.json
              CAMPAIGNS=$(python3 -c "import json; print(len(json.load(open('data/partners.json'))['campaigns']))")
              echo "Partner data downloaded successfully: $CAMPAIGNS campaigns"
            else
              echo "WARNING: Downloaded file is not valid partners.json, skipping"
            fi
          else
            echo "Failed to download partners.json (HTTP $HTTP_CODE), partner posts will be skipped"
          fi

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: masha_bot.db
          key: masha-bot-db-v3
          restore-keys: |
            masha-bot-db-

      - name: Cache local model
        uses: actions/cache@v4
        with:
          path: models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
          key: ruadapt-qwen3-4b-instruct-q4km-masha-v1
          restore-keys: |
            qwen3-4b-
            ruadapt-qwen3-4b-

      - name: Download local model (if not cached)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p models
          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "Model file found in cache: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "Cached file too small, removing..."
              rm -f models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
            fi
          fi

          if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            echo "Downloading RuadaptQwen3-4B-Instruct Q4_K_M (~2.3GB)..."
            if [ -n "$HF_TOKEN" ]; then
              echo "Using HF_TOKEN for authenticated download"
              pip install -q huggingface_hub
              huggingface-cli download RefalMachine/RuadaptQwen3-4B-Instruct-GGUF Q4_K_M.gguf --local-dir models --token "$HF_TOKEN" || true
              # huggingface-cli saves as Q4_K_M.gguf, rename to expected name
              if [ -f "models/Q4_K_M.gguf" ] && [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                mv models/Q4_K_M.gguf models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
              fi
              # If still not available, try direct download with auth
              if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                echo "HF hub download failed, trying direct URL with auth..."
                curl -L --retry 3 --max-time 600 \
                  -H "Authorization: Bearer $HF_TOKEN" \
                  -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                  "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf" || true
              fi
              # If still not available, try without auth
              if [ ! -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
                echo "Authenticated download failed, trying unauthenticated..."
                curl -L --retry 3 --max-time 600 \
                  -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                  "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf" || true
              fi
            else
              echo "No HF_TOKEN set, trying unauthenticated download..."
              curl -L --retry 3 --max-time 600 \
                -o models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf \
                "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf" || true
            fi
          fi

          # Verify model file
          if [ -f "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" ]; then
            SIZE=$(stat -c%s "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf" 2>/dev/null || echo 0)
            SIZE_MB=$((SIZE / 1048576))
            echo "Model file: ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 100 ]; then
              echo "ERROR: Model file too small (${SIZE_MB} MB), likely corrupted!"
              rm -f models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf
              echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
            else
              echo "Model downloaded successfully!"
            fi
          else
            echo "WARNING: Model download failed, running in cloud-only mode"
            echo "ENABLE_LOCAL_MODEL=false" >> $GITHUB_ENV
          fi

      - name: Ensure .gitignore allows database
        run: |
          if [ -f .gitignore ]; then
            sed -i '/masha_bot\.db/d' .gitignore
          fi

      # ── Run the Bot — UNLIMITED AUTO-RESTART (aligned with asya-bot) ──
      - name: Run Masha Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          # Pollinations.ai — DUAL KEY FAILOVER
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
          # Cloudflare Workers AI — FALLBACK
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_ACCOUNT_ID_2: ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_API_TOKEN_2: ${{ secrets.CF_API_TOKEN_2 }}
          # GitHub PAT for self-dispatch
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          GH_REPO: sochiautoparts/masha-bot
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          # Local model — ENABLED (RuadaptQwen3-4B-Instruct Q4_K_M, ~2.5GB)
          ENABLE_LOCAL_MODEL: ${{ env.ENABLE_LOCAL_MODEL || 'true' }}
          MODEL_PATH: "models/RuadaptQwen3-4B-Instruct-Q4_K_M.gguf"
          MODEL_N_CTX: "8192"
          MODEL_N_THREADS: "4"
          MODEL_MAX_TOKENS: "1024"
          MODEL_AUTO_DOWNLOAD: "true"
          MODEL_DOWNLOAD_URL: "https://huggingface.co/RefalMachine/RuadaptQwen3-4B-Instruct-GGUF/resolve/main/Q4_K_M.gguf"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Database
          DB_PATH: masha_bot.db
          ADMITAD_ADS_FILE: data/partners.json
          LOG_LEVEL: INFO
          # Schedule settings — 4 news per hour + 1 partner per cycle.
          # The 48h TTL dedup (posted_urls table) makes the pool recyclable:
          # after 48h, articles become re-postable, sustaining 96 news/day +
          # 24 partner/day = 120 posts/day without exhausting the source.
          NEWS_FETCH_INTERVAL: 900      # 15 min
          CHANNEL_POST_INTERVAL: 3600   # 60 min (1h)
          NEWS_INTERVAL_MINUTES: "15"
          CHANNEL_POST_INTERVAL_MINUTES: "60"
          CHANNEL_NEWS_PER_HOUR: "4"
          CHANNEL_PARTNER_PER_HOUR: "1"
          PARTNER_POST_INTERVAL_HOURS: "1"
        run: |
          echo "=== Starting Masha Bot v15.0 — LOCAL-FIRST (aligned with asya-bot) ==="
          echo "LOCAL MODEL: RuadaptQwen3-4B-Instruct Q4_K_M (Russian-optimized, PRIMARY for chat/comments)"
          echo "CLOUD: Pollinations (44+ models, dual-key) + Cloudflare (mistral-small-3.1)"
          echo "STRATEGY: LOCAL-first (chat/comments) / CLOUD-first (functions)"
          echo "FAILOVER: Local -> Pollinations(key) -> Pollinations(free) -> Cloudflare -> Local-Only/Static"
          echo "EDITORIAL TEAM: Маша + Серёга + Костя + Лена + Доктор Ван Дамм(кот) + Кинг-Конг(попугай)"
          echo "NEWS: BMW news from sochiautoparts/nws (bmw-news.json) -> RSS fallback -> Web search"
          echo "SCHEDULE: News every 15min, Posts every 60min (4 news + 1 partner per hour)"
          echo "=== Launching bot with UNLIMITED auto-restart ==="

          # UNLIMITED retries — bot MUST always be running! (aligned with asya-bot)
          RETRY=0
          while true; do
            RETRY=$((RETRY+1))
            echo "--- Attempt $RETRY ---"

            python3 -m bot.main
            EXIT_CODE=$?
            echo "Bot exited with code $EXIT_CODE (attempt $RETRY)"

            # Intelligent backoff based on exit code
            if [ $EXIT_CODE -eq 2 ]; then
              echo "Persistent conflicts — restarting in 10s..."
              sleep 10
            elif [ $EXIT_CODE -eq 3 ]; then
              echo "Health check failure — restarting in 20s..."
              sleep 20
            elif [ $EXIT_CODE -eq 0 ]; then
              echo "Session timeout — restarting in 5s..."
              sleep 5
            else
              if [ $RETRY -le 3 ]; then
                SLEEP=10
              elif [ $RETRY -le 6 ]; then
                SLEEP=15
              else
                SLEEP=30
              fi
              echo "Bot crashed (code $EXIT_CODE) — restarting in ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

      - name: Save database cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: masha_bot.db
          key: masha-bot-db-v3-${{ github.run_id }}

      - name: Save database to git
        if: always()
        run: |
          if [ -f masha_bot.db ]; then
            git config user.name "Masha Bot"
            git config user.email "masha-bot@users.noreply.github.com"
            # Remove phantom file if it exists before committing
            rm -f '=0.3.0'
            git add -f masha_bot.db || true
            git diff --staged --quiet || git commit -m "db: update $(date +%Y-%m-%d_%H:%M)" || true
            # Stage all remaining changes before pulling to avoid "unstaged changes" error
            git add -A || true
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push || true
          fi

      # ── Self-dispatch for 24/7 (aligned with asya-bot) ──
      - name: Re-dispatch workflow for continuous operation
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          echo "=== Re-dispatching workflow for 24/7 uptime ==="
          REPO=${{ github.repository }}
          sleep 10
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/bot.yml/dispatches" \
              -d '{"ref":"main"}')
            if [ "$HTTP_CODE" = "204" ]; then
              echo "Workflow re-dispatched successfully (attempt $i)"
              break
            fi
            echo "Re-dispatch attempt $i failed (HTTP $HTTP_CODE), retrying in 10s..."
            sleep 10
          done
          echo "=== Re-dispatch complete ==="

      - name: Cleanup
        if: always()
        run: |
          echo "=== Bot session ended ==="
