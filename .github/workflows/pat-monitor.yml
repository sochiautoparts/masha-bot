name: PAT Health Check

# Мониторинг валидности GH_PAT_TOKEN.
# Если PAT протух/отозван — алерт в Telegram через BOT_TOKEN (не зависит от PAT).
# Не зависит от PAT для собственного выполнения (использует GITHUB_TOKEN).

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pat-health
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check GH_PAT_TOKEN validity
        env:
          GH_PAT_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          set +e
          echo "=== PAT Health Check ==="
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          if [ -z "$GH_PAT_TOKEN" ]; then
            echo "GH_PAT_TOKEN secret is EMPTY"
            STATE="empty"
            HTTP="N/A"
          else
            HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -H "Authorization: token $GH_PAT_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/sochiautoparts/masha-bot")
            echo "API check: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              STATE="ok"
              echo "PAT is alive"
            else
              STATE="dead"
              echo "PAT is DEAD"
              head -c 300 /tmp/resp.json
              echo ""
            fi
          fi

          echo "Final state: $STATE"

          if [ "$STATE" != "ok" ]; then
            MSG=$(printf 'Masha Bot: GH_PAT_TOKEN %s (HTTP %s).\n\n24/7 контур сломан: self-dispatch и push БД не работают.\n\nКак починить:\n1. GitHub Settings Developer settings Fine-grained PAT Generate new token\n   Права: Administration W, Actions W, Contents W, Metadata R\n   Срок: 1 year (max)\n2. Обнови секрет: gh secret set GH_PAT_TOKEN -R sochiautoparts/masha-bot\n3. Готово — следующий cron-запуск bot.yml подхватит.' "$STATE" "$HTTP")

            echo "=== Sending Telegram alert ==="
            if [ -n "$BOT_TOKEN" ] && [ -n "$OWNER_ID" ]; then
              ALERT_HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
                -d chat_id="$OWNER_ID" \
                --data-urlencode "text=$MSG")
              echo "Telegram alert: HTTP $ALERT_HTTP"
            else
              echo "BOT_TOKEN or OWNER_ID not set — cannot alert"
            fi

            exit 1
          fi

          echo "=== Health check passed ==="
